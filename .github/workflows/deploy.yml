name: Deploy to hosub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOSUB_HOST }}
          username: ${{ secrets.HOSUB_USER }}
          key: ${{ secrets.HOSUB_SSH_KEY }}
          script: |
            set -e
            cd /opt/hosub-mcp
            git pull --ff-only origin main
            .venv/bin/pip install -r requirements.txt
            sudo systemctl restart hosub-mcp
            sleep 2
            systemctl is-active hosub-mcp
