<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>hosub-trading</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  :root { color-scheme: dark; }
  body { font-family: system-ui, sans-serif; margin: 0; background: #12141a; color: #e6e6e6; }
  header { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: #1a1e27; }
  header h1 { font-size: 16px; margin: 0; }
  .badge { padding: 2px 10px; border-radius: 10px; font-size: 12px; font-weight: 700; }
  .badge.mock { background: #274a27; color: #9be29b; }
  .badge.real { background: #5a1f1f; color: #ffb3b3; }
  main { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; padding: 12px 16px; }
  @media (max-width: 900px) { main { grid-template-columns: 1fr; } }
  section { background: #1a1e27; border-radius: 8px; padding: 12px; }
  h2 { font-size: 14px; margin: 0 0 8px; color: #aab; }
  #chart { height: 380px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 6px 4px; border-bottom: 1px solid #2a2f3a; }
  .short { color: #ff8484; } .long { color: #7ee08a; }
  button { border: 0; border-radius: 6px; padding: 5px 10px; cursor: pointer; font-weight: 600; }
  .ok { background: #2f6b3a; color: #fff; } .no { background: #6b2f2f; color: #fff; }
  select { background: #232836; color: #eee; border: 1px solid #333a48; padding: 4px 8px; border-radius: 6px; }
  .muted { color: #778; font-size: 12px; }
</style>
</head>
<body>
<header>
  <h1>hosub-trading</h1>
  <span id="envBadge" class="badge mock">…</span>
  <select id="symbolSel"></select>
  <span id="lastRun" class="muted"></span>
</header>
<main>
  <section>
    <h2>차트 (1분봉)</h2>
    <div id="chart"></div>
  </section>
  <section>
    <h2>계좌</h2>
    <div id="acctBox" class="muted">불러오는 중…</div>
    <h2 style="margin-top:16px">승인 대기 주문</h2>
    <table id="pendingTbl"><thead><tr>
      <th>종목</th><th>규칙</th><th>방향</th><th>진입/손절/목표</th><th>수량</th><th></th>
    </tr></thead><tbody></tbody></table>
    <h2 style="margin-top:16px">최근 신호</h2>
    <table id="sigTbl"><thead><tr>
      <th>종목</th><th>규칙</th><th>방향</th><th>사유</th>
    </tr></thead><tbody></tbody></table>
    <h2 style="margin-top:16px">키움 API 설정</h2>
    <div id="cfgForm" style="display:grid;gap:6px;font-size:13px">
      <select id="cfgEnv">
        <option value="mock">모의투자 (mockapi)</option>
        <option value="real">실전 (api.kiwoom.com)</option>
      </select>
      <input id="cfgAppKey" placeholder="앱키" autocomplete="off">
      <input id="cfgSecret" type="password" placeholder="시크릿 키" autocomplete="new-password">
      <input id="cfgAccount" placeholder="계좌번호" autocomplete="off">
      <button id="cfgSave" class="ok">저장</button>
      <div id="cfgMsg" class="muted"></div>
    </div>
  </section>
</main>
<script>
const chart = LightweightCharts.createChart(document.getElementById('chart'), {
  layout: { background: { color: '#1a1e27' }, textColor: '#ccc' },
  grid: { vertLines: { color: '#232836' }, horzLines: { color: '#232836' } },
  timeScale: { timeVisible: true, secondsVisible: false },
});
const candles = chart.addCandlestickSeries({
  upColor: '#e05a5a', downColor: '#4a7dd6',           // 한국식: 상승=빨강, 하락=파랑
  wickUpColor: '#e05a5a', wickDownColor: '#4a7dd6', borderVisible: false,
});
const $ = (id) => document.getElementById(id);
async function j(url, opt) { const r = await fetch(url, opt); if (!r.ok) throw new Error(await r.text()); return r.json(); }

let watchlist = {};
async function refreshStatus() {
  const s = await j('/api/status');
  const badge = $('envBadge');
  badge.textContent = s.env === 'real' ? '실전' : '모의투자';
  badge.className = 'badge ' + (s.env === 'real' ? 'real' : 'mock');
  $('lastRun').textContent = s.engine_enabled ? ('마지막 평가: ' + (s.last_run || '—')) : '엔진 꺼짐 (API 키 미설정)';
  if (Object.keys(watchlist).length === 0) {
    watchlist = s.watchlist;
    const sel = $('symbolSel');
    sel.innerHTML = Object.entries(watchlist).map(([c, n]) => `<option value="${c}">${n} (${c})</option>`).join('');
    sel.onchange = refreshChart;
  }
}
async function refreshChart() {
  const sym = $('symbolSel').value;
  if (!sym) return;
  candles.setData(await j('/api/bars/' + sym));
}
function fmt(n) { return Number(n).toLocaleString('ko-KR', { maximumFractionDigits: 0 }); }
async function refreshOrders() {
  const pending = await j('/api/orders?status=pending');
  $('pendingTbl').querySelector('tbody').innerHTML = pending.map(o => `
    <tr><td>${o.symbol}</td><td>${o.rule}</td>
    <td class="${o.side}">${o.side === 'short' ? '숏' : '롱'}</td>
    <td>${fmt(o.entry)} / ${fmt(o.stop)} / ${fmt(o.target)}</td><td>${o.qty}</td>
    <td><button class="ok" onclick="act('${o.id}','approve')">승인</button>
        <button class="no" onclick="act('${o.id}','reject')">거부</button></td></tr>`
  ).join('') || '<tr><td colspan="6" class="muted">대기 중인 주문 없음</td></tr>';
  const sigs = await j('/api/signals');
  $('sigTbl').querySelector('tbody').innerHTML = sigs.slice(0, 15).map(s => `
    <tr><td>${s.name}</td><td>${s.rule}</td>
    <td class="${s.side}">${s.side === 'short' ? '숏' : '롱'}</td><td>${s.reason}</td></tr>`
  ).join('') || '<tr><td colspan="4" class="muted">오늘 신호 없음</td></tr>';
}
async function act(id, verb) {
  if (verb === 'approve' && !confirm('이 주문을 실제로 발주할까요?')) return;
  try { await j(`/api/orders/${id}/${verb}`, { method: 'POST' }); }
  catch (e) { alert('실패: ' + e.message); }
  refreshOrders();
}
window.act = act;
async function refreshAccount() {
  try {
    const a = await j('/api/account');
    const box = $('acctBox');
    if (!a.ok) { box.textContent = '계좌 조회 불가: ' + (a.error || ''); return; }
    const tone = a.total_pl >= 0 ? '#ff8484' : '#7ea7ff';
    box.innerHTML = `
      <div>계좌: ${a.account_name || '—'} | 추정예탁자산 <b>${fmt(a.deposit_est)}</b>원</div>
      <div>평가 ${fmt(a.total_eval)}원 (매입 ${fmt(a.total_buy)}) ·
        <span style="color:${tone}">손익 ${fmt(a.total_pl)}원 (${a.total_pl_rt.toFixed(2)}%)</span></div>
      ${a.holdings.length ? `<table style="margin-top:6px"><thead><tr>
        <th>종목</th><th>수량</th><th>평단</th><th>현재가</th><th>손익</th></tr></thead><tbody>${
        a.holdings.map(h => `<tr><td>${h.name || h.code}</td><td>${fmt(h.qty)}</td>
          <td>${fmt(h.avg_price)}</td><td>${fmt(h.cur_price)}</td>
          <td style="color:${h.pl_amt >= 0 ? '#ff8484' : '#7ea7ff'}">${fmt(h.pl_amt)} (${h.pl_rt.toFixed(1)}%)</td></tr>`).join('')
      }</tbody></table>` : '<div class="muted">보유 종목 없음</div>'}`;
  } catch (e) { $('acctBox').textContent = '계좌 조회 실패: ' + e.message; }
}
async function refreshSettings() {
  const s = await j('/api/settings');
  $('cfgEnv').value = s.env;
  $('cfgAppKey').placeholder = s.app_key_masked ? `앱키 (현재 ${s.app_key_masked})` : '앱키 (미설정)';
  $('cfgSecret').placeholder = s.has_secret ? '시크릿 키 (설정됨 — 변경 시에만 입력)' : '시크릿 키 (미설정)';
  $('cfgAccount').placeholder = s.account_masked ? `계좌번호 (현재 ${s.account_masked})` : '계좌번호 (미설정)';
}
$('cfgSave').onclick = async () => {
  if ($('cfgEnv').value === 'real' &&
      !confirm('실전 환경으로 저장합니다. 승인된 주문은 실제 계좌로 발주됩니다. 계속할까요?')) return;
  try {
    const r = await j('/api/settings', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        env: $('cfgEnv').value, app_key: $('cfgAppKey').value,
        secret_key: $('cfgSecret').value, account: $('cfgAccount').value,
      }),
    });
    $('cfgMsg').textContent = `저장됨 (환경: ${r.env === 'real' ? '실전' : '모의투자'})`;
    $('cfgAppKey').value = $('cfgSecret').value = $('cfgAccount').value = '';
    refreshSettings(); refreshStatus();
  } catch (e) { $('cfgMsg').textContent = '저장 실패: ' + e.message; }
};
refreshStatus().then(refreshChart);
refreshOrders();
refreshSettings();
refreshAccount();
setInterval(() => { refreshStatus(); refreshOrders(); refreshAccount(); }, 10000);
setInterval(refreshChart, 5000); // 실시간 분봉 (형성 중 봉 포함)
</script>
</body>
</html>
