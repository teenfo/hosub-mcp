# 감시 종목 (종목코드: 메모) — 소액 계좌로 실제 매수 가능하도록 저가·고유동 종목 위주.
# 참고: config 의 watchlist 는 DB 가 비었을 때 '최초 시드'로만 쓰인다(운영 기준은 DB).
watchlist:
  "010140": 삼성중공업
  "011200": HMM
  "003490": 대한항공
  "047040": 대우건설
  "034220": LG디스플레이
  "073240": 금호타이어
  "060250": NHN KCP
  "064260": 다날
# 숏 신호를 인버스 ETF 매수로 집행할 때 사용할 매핑.
# 주의: long_only=true(롱 전용) 이면 숏 신호를 아예 발주하지 않으므로 이 값은 미사용.
inverse_etf: "114800"   # KODEX 인버스 (지수 하락 베팅용 — 롱 전용에선 미사용)

# 급등주 스캐너: 거래대금상위(ka10032)에서 등락률·거래대금·가격 필터 교차
scanner:
  enabled: true
  market: "000"          # 000 전체 / 001 코스피 / 101 코스닥
  min_change_pct: 3.0    # 당일 등락률 최소 (하락장 주도주 = 지수 역행 상승)
  min_trade_value: 10000 # trde_prica 와 같은 단위(통상 백만원 → 100억). 실호출로 단위 검증할 것
  min_price: 1000        # 저가주 제외
  top_n: 10
  # 급등 '조짐' (거래량급증 ka10023): 거래량이 터졌는데 가격은 아직인 종목
  min_volume_surge_pct: 300.0  # 거래량 급증률 최소 (%)
  change_pct_min: -1.0         # 등락률 범위 — 이미 급등한 종목은 위 스캐너 몫
  change_pct_max: 3.0

# KOSPI 급등률 상위(ka10027) 실시간 조회 + 저가주 자동 감시편입
gainers:
  enabled: true
  market: "001"           # 001 코스피 / 101 코스닥
  min_price: 1000              # 저가주 하한(동전주 제외)
  min_trade_value_krw: 100000000  # 유동성 하한 — 거래량×현재가 근사(원). 1억
  trade_max_price: 30000       # 이하=매매 tier / 초과=수집전용 tier
  top_n: 15               # 편입 상위 종목 수
  auto_watch: true        # 급등주를 감시목록에 자동 편입(source=gainer, 다음 스캔때 교체)

# 야간 발굴: 장 마감 후 전종목 일봉 수집·스크리닝 (평일 17:30 KST)
discovery:
  enabled: true
  vol_surge_ratio: 3.0          # 전일 거래량 ≥ 20일 평균 × N
  near_high_ratio: 0.97         # 60일 고가 대비 종가 비율
  min_price: 1000
  min_trade_value_krw: 1000000000  # 전일 거래대금 최소 (10억 원)
  min_score: 2                  # 3규칙 중 최소 충족 수
  top_n: 20
  max_symbols: 0                # 0 = 전종목 (테스트 시 소수로 제한)
  auto_watch: true              # 발굴 상위 종목을 감시목록에 자동 편입
  auto_watch_n: 5               # 자동 편입 수 (기존 auto 항목은 교체됨)
  bearish_min_score: 2          # 하락(숏) 후보 최소 점수(역배열·저점근접·60이평 하회 중)
  regime:                       # 시장 국면 판정(60이평 상회 종목 비율=breadth 기준)
    bull_breadth: 60            # 이 이상이면 강세장
    bear_breadth: 40            # 이 이하면 약세장 (사이는 중립)
  # ETF·ETN·리츠·채권형 등 비보통주 제외 (이름 기반). 아래 비우면 기본값 사용.
  # exclude_keywords: [리츠, 스팩, ETN, ETF, 레버리지, 인버스, 선물, 채권, 국채, 금리, 액티브, 커버드콜, 배당, TR, 합성]
  # exclude_prefixes: [KODEX, TIGER, KOSEF, ARIRANG, HANARO, TIMEFOLIO, KOACT, TREX, PLUS, RISE, ACE, SOL, KBSTAR]

# 전종목 피처 데이터셋 파일 내보내기 (외부 스케줄러/분석기가 소비)
export:
  enabled: true
  keep_days: 30                 # datasets/<날짜>/ 보관 일수

# 주문체결 실시간 수신 (실측 체결가로 진입가 정밀화). FID 코드는 계정/환경마다
# 다를 수 있어 라이브 체결 로그(주문체결 수신 INFO)로 검증 후 아래 fids 를 조정한다.
execution:
  enabled: true
  rt_type: "00"                 # 주문체결 실시간 타입(계좌 스코프)
  # 자동 청산 — 키움 REST 는 스톱주문이 없어 서버가 감시 후 직접 발주한다.
  auto_exit: true               # false 면 청산 자동화 끔(장부 기록만)
  stop_mode: auto               # auto=손절 즉시 시장가 매도(B) / approve=손절도 승인(A). 목표는 항상 승인.
  # fids:                       # 기본값 사용. 검증 후 필요 시 덮어쓰기.
  #   ord_no: "9203"            # 주문번호
  #   symbol: "9001"            # 종목코드
  #   state:  "913"             # 주문상태(접수/체결)
  #   price:  "910"             # 체결가
  #   qty:    "911"             # 체결량
  #   ts:     "908"             # 체결시간

# 수집 로스터 — 감시목록에서 빠져도 유예기간 동안 분봉 백필을 이어가 축적
# 흐름이 끊기지 않게 한다(트레이딩 감시목록과 분리된 '수집 대상' 집합).
collection:
  roster_enabled: true
  roster_retention_days: 30     # 마지막 감시 후 이 기간까지 계속 수집(초과 시 중단)
  roster_backfill_max: 200      # 이탈 종목 1회 백필 상한(레이트리밋 방어)

# 분봉 축적분 주기 백테스트 리포트 (평일 장 마감 후 1회, 결과 스냅샷 보관)
backtest:
  report_enabled: true
  min_days: 3                   # 리포트 대상 최소 분봉 축적일수
  keep_days: 120                # 분봉 보관 일수(초과분 정리 — 디스크 방어)
  run_after: "15:40"            # 장 마감 후 실행 시각(KST)

risk:
  long_only: true             # 롱 전용 — 현물 계좌는 개별주 공매도 불가, 숏 신호 미발주
  risk_per_trade_pct: 0.5     # 1회 손절 시 계좌 대비 최대 손실 %
  daily_target_pct: 1.0       # 일일 목표 % (도달 시 이익 확정·신규 진입 중단) — UI에서 변경
  daily_loss_limit_pct: 2.0   # 일일 누적 손실 한도 % (도달 시 신규 진입 중단) — UI에서 변경
  max_positions: 3
  signal_ttl_min: 10          # 승인 대기 신호 만료(분)

rules:
  # 손절폭 상한(%). 손절 거리가 이보다 크면 신호 폐기 — 고변동성·와이드스탑
  # 저품질 거래(예: OCI 6% 스탑) 차단. 0 이면 필터 끔.
  max_stop_pct: 4.0
  orb:
    enabled: true
    range_start: "09:00"
    range_end: "09:15"
    target_r: 1.5             # 목표가 = 손절 거리의 1.5배
  gap:
    enabled: true
    min_gap_pct: 2.0          # 시가 갭 최소 크기
    range_wait_until: "10:00" # 첫 1시간 범위 형성 대기
    trail_long_pct: 8.0
    trail_short_pct: 4.0
  # 반등 페이드 — 딥리서치 검증 결론(하락장 단타의 추세 정렬 방향)을 코드화한 규칙.
  # 숏 전용 규칙 → 롱 전용 모드에선 발주되지 않으므로 비활성(신호 산출도 생략).
  bounce_fade:
    enabled: false
    rsi_hot: 60               # 반등 과열 하한 (딥리서치: RSI 60~70 도달이 매도 기회)
    rsi_max: 100              # 반등 과열 상한 (필요 시 70 으로 좁힘)
    lookback: 30              # 저점 갱신 구조 확인용 봉 수
    candle_confirm: reversal  # reversal=하락장악/유성 확인 / any=단순 음봉
    atr_stop_mult: 0.5        # 손절 = 반등고점 + 0.5×ATR (스탑 헌팅 회피, 딥리서치 6단계)
    atr_period: 14
    require_downtrend: true   # 1단계 추세 게이트: 일봉 하락(역배열/장기선 하회)일 때만
    require_volume_dry: false # 반등 거래량 소진 조건(옵션)
  breakdown_retest:              # 숏 전용 규칙 → 롱 전용 모드에선 비활성
    enabled: false
    support_lookback: 60      # 지지선 산출용 봉 수
    retest_tolerance_pct: 0.3
    atr_stop_mult: 0.5        # 손절 = 지지선 + 0.5×ATR
    atr_period: 14
    require_downtrend: true   # 1단계 추세 게이트
    # 하방 이탈 거래량 확인 — 딥리서치에서 '평균 120% 필터'는 근거 부족으로 기각됨.
    # 하드코딩하지 않고 선택 사용(기본 OFF). 켜면 vol_confirm_ratio 로 강도 조절.
    require_volume: false
    vol_confirm_ratio: 1.2

costs:
  commission_pct: 0.015       # 위탁 수수료(편도)
  sell_tax_pct: 0.15          # 증권거래세(매도)
  slippage_bp: 5
