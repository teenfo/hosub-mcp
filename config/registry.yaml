# hosub MCP 서버 화이트리스트 레지스트리
#
# 이 파일은 "안전한 기본 경로" 도구들이 다룰 수 있는 대상 목록이다.
# 변경은 반드시 Git PR 리뷰를 거쳐 반영한다 (권한 변경 이력 감사 목적).
#
# 주의: run_command / write_file 같은 서버 전체 제어 도구는 이 레지스트리와
# 무관하게 임의 명령/경로를 다룰 수 있다. 이 파일은 restart_service /
# read_service_logs / deploy_service / run_script / run_backup 에만 적용된다.

services:
  bcl-portal:
    unit: bcl-portal.service
    description: "BCL Portal 웹 서비스 (FastAPI)"
    deploy:
      workdir: /opt/bcl-portal
      steps:
        - ["git", "pull", "--ff-only"]
        - ["docker", "compose", "up", "-d", "--build"]
      restart_after: false
      timeout_seconds: 900
  ollama:
    unit: ollama.service
    description: "Ollama LLM 런타임 (qwen2.5:14b 등)"

scripts:
  daily_backup:
    path: /opt/scripts/backup_db.sh
    description: "DB 전체 백업"
    timeout_seconds: 1800
  cleanup_logs:
    path: /opt/scripts/cleanup_logs.sh
    description: "오래된 로그 정리"
    timeout_seconds: 300
  ddns_refresh:
    path: /opt/scripts/cloudflare_ddns.sh
    description: "Cloudflare DDNS 갱신"
    timeout_seconds: 120

# run_backup 도구가 위임하는 스크립트 이름 (scripts 에 존재해야 함)
backup_script: daily_backup
