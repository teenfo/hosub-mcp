<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>hosub 대시보드 로그인</title>
  <link rel="stylesheet" href="/static/vendor/bootstrap/bootstrap.min.css" />
  <link rel="stylesheet" href="/static/vendor/bootstrap-icons/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/static/style.css" />
  <script>
    (function () {
      var t = localStorage.getItem("hosub-theme");
      if (!t) t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      document.documentElement.setAttribute("data-bs-theme", t);
    })();
  </script>
</head>
<body class="hosub-login-body">
  <div class="d-flex align-items-center justify-content-center min-vh-100 p-3">
    <div class="card shadow-sm login-card">
      <div class="card-body p-4">
        <h1 class="h4 mb-1">🖥️ hosub 대시보드</h1>
        <p class="text-secondary small mb-4">서버 모니터링 대시보드에 접속하려면 비밀번호를 입력하세요.</p>
        <form method="post" action="/login" id="login-form">
          <div class="mb-3">
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" class="form-control" placeholder="비밀번호"
                     autofocus autocomplete="current-password" />
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right"></i> 로그인
          </button>
          <div class="alert alert-danger mt-3 mb-0 py-2 d-none" id="err">
            비밀번호가 올바르지 않습니다.
          </div>
        </form>
      </div>
    </div>
  </div>
  <script src="/static/login.js"></script>
</body>
</html>
