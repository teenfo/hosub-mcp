<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>hosub 서버 대시보드</title>
  <link rel="stylesheet" href="/static/vendor/bootstrap/bootstrap.min.css" />
  <link rel="stylesheet" href="/static/vendor/bootstrap-icons/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/static/style.css" />
  <script>
    // FOUC 방지: 저장된 테마를 즉시 적용
    (function () {
      var t = localStorage.getItem("hosub-theme");
      if (!t) t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      document.documentElement.setAttribute("data-bs-theme", t);
    })();
  </script>
</head>
<body>
  <!-- 사이드바 (데스크톱 고정 / 모바일 offcanvas) -->
  <div class="offcanvas-lg offcanvas-start hosub-sidebar text-bg-dark" tabindex="-1" id="sidebar">
    <div class="offcanvas-header d-lg-none">
      <span class="fs-5 fw-semibold">🖥️ hosub</span>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" data-bs-target="#sidebar"></button>
    </div>
    <div class="offcanvas-body flex-column p-0">
      <div class="sidebar-brand d-none d-lg-flex">🖥️ <span>hosub</span></div>
      <ul class="nav nav-pills flex-column mb-auto px-2" id="sidebar-nav">
        <li class="nav-item"><a class="nav-link active" href="#panel-system"><i class="bi bi-speedometer2"></i> 대시보드</a></li>
        <li class="nav-item"><a class="nav-link" href="#panel-services"><i class="bi bi-hdd-stack"></i> 서비스</a></li>
        <li class="nav-item"><a class="nav-link" href="#panel-jobs"><i class="bi bi-list-task"></i> 잡</a></li>
        <li class="nav-item"><a class="nav-link" href="#panel-audit"><i class="bi bi-shield-check"></i> 감사 로그</a></li>
        <li class="nav-item"><a class="nav-link" href="#panel-home"><i class="bi bi-house"></i> 홈</a></li>
      </ul>
      <div class="px-3 py-2 small text-secondary border-top border-secondary-subtle mt-2">
        hosub MCP 대시보드 · 조회 전용
      </div>
    </div>
  </div>

  <!-- 메인 영역 -->
  <div class="hosub-main">
    <nav class="navbar hosub-navbar sticky-top border-bottom px-3">
      <button class="btn btn-outline-secondary d-lg-none me-2" type="button"
              data-bs-toggle="offcanvas" data-bs-target="#sidebar" aria-label="메뉴">
        <i class="bi bi-list"></i>
      </button>
      <span class="navbar-brand mb-0 h5 brand-toggle">🖥️ hosub 서버 대시보드</span>
      <div class="ms-auto d-flex align-items-center gap-2">
        <span class="text-secondary small d-none d-sm-inline" id="clock"></span>
        <button class="btn btn-outline-secondary btn-sm" id="theme-toggle" title="테마 전환">
          <i class="bi bi-moon-stars"></i>
        </button>
        <a class="btn btn-outline-danger btn-sm" href="/logout"><i class="bi bi-box-arrow-right"></i> <span class="d-none d-sm-inline">로그아웃</span></a>
      </div>
    </nav>

    <main class="container-fluid py-3">
      <div class="row g-3" id="grid"></div>
    </main>
  </div>

  <script src="/static/vendor/bootstrap/bootstrap.bundle.min.js"></script>
  <script type="module" src="/static/app.js"></script>
</body>
</html>
